<div class="fix dream pt-sec">
    <div class="dream__container">
        <div class="dream__body" data-aos="fade-up">
            <div class="dream__line line-vertical">
                <div class="sq"></div>
                <div class="sq"></div>
            </div>
            <form action="#" class="dream__row">
                <h2 class="dream__title bs-title">
                    Запишитесь на просмотр 
                </h2>
                <p class="dream__text">
                    Лучший способ понять, подходит ли вам наш поселок - увидеть его своими глазами. Запишитесь на бесплатную экскурсию с персональным гидом - жителем поселка.
                </p>

                <div class="fix__row forms-mot__row items-input-row">
                    <div class="item-input">
                        <input type="text" name="name" placeholder="Ваше имя" class="item-input__input _req">
                    </div>
                    <div class="item-input">
                        <input type="text" name="phone" placeholder="+7 (999) 999-99-99" class="item-input__input _req _obligat tel">
                    </div>
                </div>

                <label class="check-politic">
                    <input type="checkbox" name="politic" class="check-politic__input _req _obligat">
                    <span class="check-politic__icon"></span>
                    <span class="check-politic__text">Я согласен с политикой конфиденциальности и даю согласие на обработку персональных данных.</span>
                </label>

                <button type="submit" class="forms-mot__btn btn">Отправить →</button>
            </form>
            <div class="fix__img">
                <img class="cover lazy" loading="lazy" data-src="@img/fix/fix-img2.png" alt="">
            </div>
        </div>
    </div>
</div>
