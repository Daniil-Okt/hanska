<div class="mot pt-sec">
    <div class="mot__container">
        <div class="mot__head bs-head m-b ta-m">
            <div class="bs-head__left">
                <p>
                    / История 
                    “Ханской Усадьбы”
                </p>
            </div>
            <div class="bs-head__right" data-aos="fade-up">
                <h2 class="mot__title bs-head__title bs-title">
                    ход строительства <span class="year"><span class="number font-2">2022</span><span class="text font-2">год <br/>основания</span></span>
                </h2>
            </div>
        </div>
        <div class="mot__line line-horiz">
            <div class="str">
                <img src="@img/mot/mot-str.svg" alt="" data-aos="fade-right" data-aos-anchor-placement="center-center">
            </div>
            <div class="sq"></div>
            <div class="sq"></div>
        </div>
    </div>
    <div class="mot__container c-np-mob">
        <div class="mot__video border-web" data-aos="fade-up" data-aos-delay="150">
            <img loading="lazy" class="cover lazy" data-src="@img/mot/mot-video.png" alt="">
            <div class="video-popup video-icon pos-ab-cover" data-type="popup-video" data-video="static/stroitelstvo.mp4"></div>

            <form action="#" class="mot__forms forms-mot">
                <div class="forms-mot__title">
                    Почувствовать атмосферу
                </div>
                <p class="forms-mot__text">
                    Лучший способ понять, подходит ли вам наш <br/>поселок - увидеть его своими глазами.
                </p>
                <div class="forms-mot__row items-input-row">
                    <div class="item-input">
                        <input type="text" name="name" placeholder="Ваше имя" class="item-input__input _req">
                    </div>
                    <div class="item-input">
                        <input type="text" name="phone" placeholder="+7 (999) 999-99-99" class="item-input__input _req _obligat tel">
                    </div>
                </div>

                <label class="check-politic">
                    <input type="checkbox" name="politic" class="check-politic__input _req _obligat">
                    <span class="check-politic__icon"></span>
                    <span class="check-politic__text">Я согласен с политикой конфиденциальности и даю согласие на обработку персональных данных.</span>
                </label>

                <button type="submit" class="forms-mot__btn btn">Отправить →</button>
            </form>
        </div>
    </div>
</div>
